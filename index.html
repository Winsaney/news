<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国产算力动态周报</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --paper: #fbfaf6;
      --canvas: #efede6;
      --panel: #fffdf8;
      --ink: #1f2524;
      --muted: #68726f;
      --soft: #9da69f;
      --line: #d9d5c8;
      --accent: #bd5736;
      --teal: #176d63;
      --blue: #315f86;
      --sidebar: 300px;
      --shadow: 0 20px 64px rgba(31, 37, 36, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(23, 109, 99, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(189, 87, 54, 0.1), transparent 30%),
        var(--canvas);
      font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image:
        linear-gradient(rgba(31, 37, 36, 0.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 37, 36, 0.6) 1px, transparent 1px);
      background-size: 38px 38px;
      mix-blend-mode: multiply;
      z-index: 3;
    }

    button,
    a {
      font: inherit;
    }

    .mono {
      font-family: "Courier New", "Noto Sans Mono CJK SC", monospace;
    }

    .app-shell {
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      height: 100vh;
    }

    .sidebar {
      height: 100vh;
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid rgba(31, 37, 36, 0.13);
      background: rgba(251, 250, 246, 0.94);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
    }

    .brand {
      padding: 28px 24px 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand-kicker {
      color: var(--teal);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .brand h1 {
      margin: 9px 0 0;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: -0.01em;
    }

    .brand p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .history-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .history-count {
      color: var(--accent);
      font-weight: 700;
    }

    .history-list {
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      padding: 14px 13px;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .history-item:hover {
      background: rgba(255, 253, 248, 0.78);
      border-color: var(--line);
      transform: translateX(2px);
    }

    .history-item.active {
      background: var(--panel);
      border-color: rgba(189, 87, 54, 0.34);
      box-shadow: 0 10px 24px rgba(31, 37, 36, 0.07);
    }

    .history-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .week {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .badge {
      border: 1px solid rgba(23, 109, 99, 0.24);
      border-radius: 999px;
      color: var(--teal);
      padding: 3px 7px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .date {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .summary {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      border-radius: 999px;
      background: rgba(49, 95, 134, 0.08);
      color: var(--blue);
      padding: 4px 7px;
      font-size: 10px;
    }

    .main {
      min-width: 0;
      min-height: 100vh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    .topbar {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .current {
      min-width: 0;
    }

    .current h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .current p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .icon-button,
    .open-link {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 253, 248, 0.86);
      color: var(--ink);
      display: grid;
      place-items: center;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .icon-button:hover,
    .open-link:hover {
      color: var(--accent);
      border-color: rgba(189, 87, 54, 0.56);
      transform: translateY(-1px);
    }

    .icon-button svg,
    .open-link svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .menu-button {
      display: none;
    }

    .viewer-wrap {
      min-width: 0;
      min-height: 0;
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(31, 37, 36, 0.08);
    }

    .report-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--paper);
    }

    .empty {
      min-height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }

    .overlay {
      display: none;
    }

    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
      }

      .app-shell {
        display: block;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 20;
        width: min(88vw, 324px);
        transform: translateX(-105%);
        transition: transform 0.22s ease;
        box-shadow: 20px 0 60px rgba(31, 37, 36, 0.18);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .overlay {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 19;
        background: rgba(31, 37, 36, 0.34);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .main {
        min-height: 100svh;
        padding: 14px;
        grid-template-rows: auto minmax(640px, 1fr);
      }

      .menu-button {
        display: grid;
        flex: 0 0 auto;
      }

      .current h2 {
        font-size: 19px;
      }

      .current p {
        font-size: 12px;
      }
    }

    @media (max-width: 560px) {
      .main {
        grid-template-rows: auto minmax(620px, 1fr);
      }

      .actions .open-link {
        display: none;
      }

      .viewer-wrap {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="历史记录">
      <section class="brand">
        <div class="brand-kicker mono">DOMESTIC COMPUTE WEEKLY</div>
        <h1>国产算力<br>动态周报</h1>
        <p>按周归档国产算力产业动态，保留每期独立页面与来源线索。</p>
      </section>

      <div class="history-meta mono">
        <span>History</span>
        <span class="history-count" id="historyCount">0</span>
      </div>

      <nav class="history-list" id="historyList"></nav>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">
      <header class="topbar">
        <button class="icon-button menu-button" id="menuButton" aria-label="打开历史记录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>

        <div class="current">
          <h2 id="currentTitle">国产算力动态周报</h2>
          <p id="currentMeta">加载中</p>
        </div>

        <div class="actions">
          <a class="open-link" id="openReport" href="reports/2026-W19.html" target="_blank" rel="noopener noreferrer" aria-label="打开当前报告">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M14 4h6v6"></path>
              <path d="M10 14 20 4"></path>
              <path d="M20 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h5"></path>
            </svg>
          </a>
        </div>
      </header>

      <section class="viewer-wrap" id="viewerWrap">
        <iframe class="report-frame" id="reportFrame" title="国产算力动态周报" src="about:blank"></iframe>
      </section>
    </main>
  </div>

  <script type="application/json" id="fallbackReports">
    [
      {
        "id": "2026-W19",
        "year": 2026,
        "week": "W19",
        "dateRange": "2026年5月10日 - 5月14日",
        "title": "国产算力动态周报",
        "summary": "生态破局期：29条情报覆盖10家厂商，摩尔线程MUSA纳入SGLang、昆仑芯A+H估值210亿、寒武纪Q1净利首破10亿",
        "href": "reports/2026-W19.html",
        "tags": ["生态破局", "寒武纪", "摩尔线程"],
        "latest": true
      },
      {
        "id": "2026-W18",
        "year": 2026,
        "week": "W18",
        "dateRange": "2026年5月1日 - 5月7日",
        "title": "国产算力动态周报",
        "summary": "业绩兑现期到来：59条情报追踪10家厂商，从「可用」到「好用」，从烧钱到盈利，从国产替代到全球竞争",
        "href": "reports/2026-W18.html",
        "tags": ["兑现期", "业绩", "IPO"],
        "latest": false
      },
      {
        "id": "2026-W17",
        "year": 2026,
        "week": "W17",
        "dateRange": "2026年4月27日 - 4月30日",
        "title": "国产算力动态周报",
        "summary": "财报季+适配周：三大AI芯片厂商Q1财报密集披露，DeepSeek V4发布8大国产芯片Day 0适配完成",
        "href": "reports/2026-W17.html",
        "tags": ["财报", "DeepSeek", "IPO"],
        "latest": false
      },
      {
        "id": "2026-W16",
        "year": 2026,
        "week": "W16",
        "dateRange": "2026年4月17日 - 4月23日",
        "title": "国产算力周报",
        "summary": "覆盖华为昇腾、寒武纪、海光信息等10家核心厂商，追踪国产AI算力产业链每周动态",
        "href": "reports/2026-W16.html",
        "tags": ["昇腾", "DeepSeek", "港股上市"],
        "latest": false
      }
    ]
  </script>

  <script>
    const historyList = document.getElementById('historyList');
    const historyCount = document.getElementById('historyCount');
    const currentTitle = document.getElementById('currentTitle');
    const currentMeta = document.getElementById('currentMeta');
    const openReport = document.getElementById('openReport');
    const reportFrame = document.getElementById('reportFrame');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuButton = document.getElementById('menuButton');

    let reports = [];
    let currentReport = null;

    function normalizeReports(items) {
      return items
        .filter(item => item && item.id && item.href)
        .map(item => ({
          title: '国产算力动态周报',
          summary: '',
          dateRange: '',
          tags: [],
          latest: false,
          ...item
        }))
        .sort((a, b) => {
          const yearDiff = Number(b.year || 0) - Number(a.year || 0);
          if (yearDiff) return yearDiff;
          return Number(String(b.week || '').replace(/\D/g, '')) - Number(String(a.week || '').replace(/\D/g, ''));
        });
    }

    function readFallbackReports() {
      const text = document.getElementById('fallbackReports').textContent;
      return JSON.parse(text);
    }

    async function loadReports() {
      try {
        const response = await fetch('reports.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to load reports.json');
        return normalizeReports(await response.json());
      } catch (error) {
        return normalizeReports(readFallbackReports());
      }
    }

    function reportLabel(report) {
      return `${report.year || ''} ${report.week || report.id}`.trim();
    }

    function renderHistory() {
      historyCount.textContent = String(reports.length);
      historyList.innerHTML = reports.map(report => `
        <button class="history-item ${currentReport && report.id === currentReport.id ? 'active' : ''}" data-report-id="${report.id}">
          <div class="history-top">
            <div class="week">${reportLabel(report)}</div>
            ${report.latest ? '<div class="badge mono">LATEST</div>' : ''}
          </div>
          <div class="date mono">${report.dateRange || report.id}</div>
          <p class="summary">${report.summary || report.title}</p>
          <div class="tags">
            ${(report.tags || []).map(tag => `<span class="tag mono">${tag}</span>`).join('')}
          </div>
        </button>
      `).join('');

      historyList.querySelectorAll('.history-item').forEach(button => {
        button.addEventListener('click', () => {
          const report = reports.find(item => item.id === button.dataset.reportId);
          if (report) selectReport(report);
        });
      });
    }

    function selectReport(report, shouldUpdateHash = true) {
      currentReport = report;
      currentTitle.textContent = `${reportLabel(report)} · ${report.title}`;
      currentMeta.textContent = report.dateRange || report.summary || report.id;
      openReport.href = report.href;
      reportFrame.src = report.href;

      if (shouldUpdateHash) {
        history.replaceState(null, '', `#${encodeURIComponent(report.id)}`);
      }

      closeSidebar();
      renderHistory();
    }

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('show');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    }

    async function init() {
      reports = await loadReports();

      if (!reports.length) {
        document.getElementById('viewerWrap').innerHTML = '<div class="empty">暂无历史记录</div>';
        currentMeta.textContent = '暂无历史记录';
        return;
      }

      const hashId = decodeURIComponent(window.location.hash.replace(/^#/, ''));
      const initialReport = reports.find(report => report.id === hashId) || reports.find(report => report.latest) || reports[0];
      selectReport(initialReport, false);
    }

    menuButton.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);
    window.addEventListener('hashchange', () => {
      const hashId = decodeURIComponent(window.location.hash.replace(/^#/, ''));
      const report = reports.find(item => item.id === hashId);
      if (report && (!currentReport || report.id !== currentReport.id)) {
        selectReport(report, false);
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeSidebar();
    });

    init();
  </script>
</body>
</html>
